language = "C"
include_guard = "TEMPOCH_FFI_H"
autogen_warning = "/* Warning: this file is auto-generated by cbindgen. Do not modify manually. */"
documentation_style = "c99"
style = "both"
cpp_compat = true
after_includes = """
/* QttyQuantity and UnitId definitions come from qtty_ffi.h */
#include "qtty_ffi.h"
"""

[export]
# Keep tempoch-owned ABI metadata visible even when the generic entry points
# accept raw integers instead of Rust enums directly.
include = ["TempochScaleId", "TempochStatus", "TempochUtc", "TempochPeriodMjd", "TempochEopValues"]
# Exclude qtty-ffi types — they come from qtty_ffi.h (included via after_includes)
exclude = ["QttyQuantity", "UnitId", "DimensionId", "QttyDerivedQuantity"]

[export.rename]
"TempochScaleId" = "tempoch_scale_id_t"
"TempochStatus" = "tempoch_status_t"
"TempochUtc" = "tempoch_utc_t"
"TempochPeriodMjd" = "tempoch_period_mjd_t"
"TempochEopValues" = "tempoch_eop_values_t"
"QttyQuantity" = "qtty_quantity_t"

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true

[fn]
prefix = ""
