[package]
name = "tempoch-core"
version = "0.4.1"
edition = "2021"
authors = ["VPRamon <vallespuigramon@gmail.com>"]
description = "Core astronomical time primitives for tempoch."
license = "AGPL-3.0-only"
repository = "https://github.com/Siderust/tempoch"

[features]
default = []
serde = ["dep:serde", "qtty/serde"]
runtime-data = ["dep:ureq", "dep:sha2", "dep:serde_json"]

[lib]
name = "tempoch_core"
path = "src/lib.rs"

[dependencies]
chrono = "0.4.43"
qtty = { version = "0.5.0", features = ["julian-time"] }
serde = { version = "1.0", default-features = false, features = ["derive", "alloc"], optional = true }
serde_json = { version = "1", optional = true }
sha2 = { version = "0.10", optional = true }
ureq = { version = "2.10", optional = true }

[dev-dependencies]
serde_json = "1"
