name: Update Time Data

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: write

concurrency:
  group: update-time-data
  cancel-in-progress: true

jobs:
  refresh:
    name: Refresh generated time data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Regenerate compiled time data
        run: cargo run --release -p tempoch-time-data-updater

      - name: Validate generated data
        run: cargo test --all-features

      - name: Commit and push if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          git add \
            tempoch-core/src/generated/time_data.rs \
            tempoch-core/src/generated/time_data.provenance.json
          if git diff --cached --quiet; then
            echo "No time-data changes; skipping commit."
            exit 0
          fi
          git commit -m "chore: refresh generated time data"
          git push origin HEAD:main
